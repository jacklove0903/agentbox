spring.application.name=agentbox-platform

# PostgreSQL Database
spring.datasource.url=jdbc:postgresql://localhost:5432/agentbox
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=postgres123
# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# application.yml
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
# H2 Console
spring.h2.console.enabled=true


spring.ai.dashscope.api-key=sk-ad3ba45effd748bbb56f0b90029ba506
spring.ai.dashscope.chat.model=qwen-turbo
spring.ai.dashscope.chat.temperature=0.7

# MyBatis-Plus
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.global-config.db-config.id-type=auto
mybatis-plus.global-config.db-config.db-type=postgresql
