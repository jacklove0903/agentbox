spring.application.name=agentbox-platform

# PostgreSQL Database
spring.datasource.url=jdbc:postgresql://localhost:5432/agentbox
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=postgres123
# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# application.yml
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
# H2 Console
spring.h2.console.enabled=true


# SiliconFlow (OpenAI-compatible)
spring.ai.openai.api-key=sk-zhyvilduzlqzuprpsnoivxutpdmhlmabqvfenwsdnshdegag
spring.ai.openai.base-url=https://api.siliconflow.cn
spring.ai.openai.chat.options.model=Qwen/Qwen2.5-7B-Instruct
spring.ai.openai.chat.options.temperature=0.7

# Web search provider (optional): set SERPER_API_KEY to enable stable Google search via Serper.
# If key is empty, backend falls back to DuckDuckGo scraping.
web.search.serper.api-key=792285485288f6c9dfb229a4f8e60a76d9f674bf
web.search.hl=zh-cn

# HikariCP connection pool
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# Tomcat thread pool
server.tomcat.threads.max=300
server.tomcat.threads.min-spare=20

# MyBatis-Plus
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.global-config.db-config.id-type=auto
mybatis-plus.global-config.db-config.db-type=postgresql

# JWT — override in production; must be at least 32 bytes (256 bits).
jwt.secret=${JWT_SECRET:change-me-to-a-long-random-secret-of-at-least-32-bytes}
jwt.expiration-ms=604800000

# Guest trial quotas (enforced server-side)
trial.chat.limit=10
trial.summarize.limit=5
trial.image.limit=3
trial.enhance.limit=5

# File upload limits — keep in sync with FileController.MAX_FILE_SIZE
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB
