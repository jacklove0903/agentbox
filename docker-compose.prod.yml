version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: agentbox-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: agentbox
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agentbox"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./agentbox-platform
    container_name: agentbox-backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/agentbox
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres123
      SPRING_AI_OPENAI_API_KEY: sk-zhyvilduzlqzuprpsnoivxutpdmhlmabqvfenwsdnshdegag
      SPRING_AI_OPENAI_BASE_URL: https://api.siliconflow.cn
      SERPER_API_KEY: ${SERPER_API_KEY:-}
      JWT_SECRET: agentbox-prod-jwt-secret-please-rotate-me-at-least-256-bits-long-0xA1B2C3
      JAVA_TOOL_OPTIONS: "-Xms256m -Xmx512m"
    volumes:
      - uploads-data:/app/uploads
    expose:
      - "8080"
    deploy:
      resources:
        limits:
          memory: 768M

  frontend:
    build:
      context: ./agentbox-frontend
      args:
        NEXT_PUBLIC_API_BASE: http://118.31.71.208
    container_name: agentbox-frontend
    restart: always
    depends_on:
      - backend
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    container_name: agentbox-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  pg-data:
  uploads-data:
