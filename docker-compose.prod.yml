version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: agentbox-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./agentbox-platform
    container_name: agentbox-backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_AI_OPENAI_API_KEY: ${SILICONFLOW_API_KEY}
      SPRING_AI_OPENAI_BASE_URL: https://api.siliconflow.cn
      JWT_SECRET: ${JWT_SECRET}
    expose:
      - "8080"

  frontend:
    build:
      context: ./agentbox-frontend
      args:
        NEXT_PUBLIC_API_BASE: http://118.31.71.208
    container_name: agentbox-frontend
    restart: always
    depends_on:
      - backend
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    container_name: agentbox-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  pg-data:
